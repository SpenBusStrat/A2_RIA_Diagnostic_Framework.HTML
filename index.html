<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Share Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .content {
            margin-bottom: 30px;
            line-height: 1.6;
            color: #555;
        }

        .share-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .share-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
        }

        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .twitter-btn {
            background: #1DA1F2;
        }

        .facebook-btn {
            background: #1877F2;
        }

        .linkedin-btn {
            background: #0A66C2;
        }

        .email-btn {
            background: #666;
        }

        .copy-btn {
            background: #667eea;
        }

        .url-section {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .url-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9em;
            background: white;
        }

        .copy-icon::after {
            content: "📋";
        }

        footer {
            margin-top: 40px;
            color: #999;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .share-buttons {
                flex-direction: column;
            }

            .share-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 Share This</h1>
        <p class="subtitle">Share your content across social media</p>

        <div class="content">
            <p>This is a simple and elegant sharing page. You can customize the content and share it with your audience.</p>
        </div>

        <div class="url-section">
            <input type="text" class="url-input" id="pageUrl" readonly value="">
            <button class="share-btn copy-btn copy-icon" onclick="copyToClipboard()" title="Copy URL">Copy</button>
        </div>

        <div class="share-section">
            <h3 style="color: #333; margin-bottom: 15px;">Share On</h3>
            <div class="share-buttons">
                <a href="#" class="share-btn twitter-btn" id="twitterShare">𝕏 Twitter</a>
                <a href="#" class="share-btn facebook-btn" id="facebookShare">f Facebook</a>
                <a href="#" class="share-btn linkedin-btn" id="linkedinShare">in LinkedIn</a>
                <a href="#" class="share-btn email-btn" id="emailShare">✉️ Email</a>
            </div>
        </div>

        <footer>
            <p>&copy; 2024 Simple Share Page. Made with ❤️</p>
        </footer>
    </div>

    <script>
        // Set the page URL on load
        document.getElementById('pageUrl').value = window.location.href;

        // Copy to clipboard function
        function copyToClipboard() {
            const urlInput = document.getElementById('pageUrl');
            urlInput.select();
            document.execCommand('copy');
            alert('URL copied to clipboard!');
        }

        // Social sharing URLs
        const pageUrl = encodeURIComponent(window.location.href);
        const pageTitle = encodeURIComponent(document.title);

        document.getElementById('twitterShare').href = 
            `https://twitter.com/intent/tweet?url=${pageUrl}&text=${pageTitle}`;

        document.getElementById('facebookShare').href = 
            `https://www.facebook.com/sharer/sharer.php?u=${pageUrl}`;

        document.getElementById('linkedinShare').href = 
            `https://www.linkedin.com/sharing/share-offsite/?url=${pageUrl}`;

        document.getElementById('emailShare').href = 
            `mailto:?subject=${pageTitle}&body=Check%20this%20out:%20${pageUrl}`;
    </script>
</body>
</html>
